version: 2
updates:
  - package-ecosystem: uv
    directory: "/app"
    schedule:
      interval: weekly
      time: "09:00"
      timezone: Pacific/Auckland
    groups:
      uv-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      time: "09:00"
      timezone: Pacific/Auckland
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      time: "09:00"
      timezone: Pacific/Auckland
    groups:
      docker-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      time: "09:00"
      timezone: Pacific/Auckland
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
