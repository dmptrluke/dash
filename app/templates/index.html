<!DOCTYPE html>
<html lang="en"{% if font_family %} style="--font-family: {{ font_family }}"{% endif %}>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="./static/bundle.css">
</head>
<body>
    <main id="container">
        <header id="header">
            <div id="header-left">
                <p id="header-date">{{ now.strftime('%A, %d %B %Y') }}</p>
                <h1 id="header-greet">{{ greeting }}</h1>
            </div>
        </header>

        <div id="search-bar">
            <iconify-icon icon="mdi:magnify" id="search-icon"></iconify-icon>
            <input type="text" id="search-input" placeholder="Filter apps…" autocomplete="off" aria-label="Filter apps">
        </div>

        
        <div id="apps-grouped">
        {% for section in apps %}
        <section class="category" style="--cat-color: {{ section.color }}" data-category="{{ section.name }}">
            <h2 class="category-title">{{ section.name }}</h2>
            <div class="apps-grid">
                {% for app in section.entries %}
                <a href="{{ app.url }}" rel="noopener noreferrer" class="app-card" style="--cat-color: {{ section.color }}" data-name="{{ app.name | lower }}" data-desc="{{ app.description | lower }}">
                    <iconify-icon class="app-icon" icon="{{ app.icon }}" noobserver></iconify-icon>
                    <div class="app-info">
                        <span class="app-name">{{ app.name }}</span>
                        <span class="app-desc">{{ app.description }}</span>
                        <span class="cat-badge">{{ section.name }}</span>
                    </div>
                </a>
                {% endfor %}
            </div>
        </section>
        {% endfor %}
        </div>

        <div id="apps-search" hidden></div>
        <p id="search-error" hidden>No matching apps found.</p>
    </main>

    <script src="./static/bundle.js" defer></script>
</body>
</html>
