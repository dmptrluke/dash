<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="./static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/iconify-icon@3.0.2/dist/iconify-icon.min.js" integrity="sha256-Am/FVmljwtoGse/9sLaiw+q1O2G65SznGIbU3ErcSQw=" crossorigin="anonymous"></script>
</head>
<body>
    <main id="container">
        <header id="header">
            <div id="header-left">
                <p id="header-date">{{ now.strftime('%A, %d %B %Y') }}</p>
                <h1 id="header-greet">{{ greeting }}</h1>
            </div>
        </header>

        <div id="search-bar">
            <iconify-icon icon="mdi:magnify" id="search-icon"></iconify-icon>
            <input type="text" id="search-input" placeholder="Filter apps…" autocomplete="off" aria-label="Filter apps">
        </div>

        <div id="category-container">
        {% for category, contents in apps.items() %}
        <section class="category" data-category="{{ category }}">
            <h2 class="category-title">{{ category }}</h2>
            <div class="apps-grid">
                {% for app in contents %}
                <a href="{{ app.url }}" rel="noopener noreferrer" class="app-card" data-name="{{ app.name | lower }}" data-desc="{{ app.description | lower }}">
                    <iconify-icon class="app-icon" icon="{{ app.icon }}"></iconify-icon>
                    <div class="app-info">
                        <span class="app-name">{{ app.name }}</span>
                        <span class="app-desc">{{ app.description }}</span>
                    </div>
                </a>
                {% endfor %}
            </div>
        </section>
        {% endfor %}
        </div>
    </main>

    <script src="./static/script.js" defer></script>
</body>
</html>
